services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      AUDIO_SUITE_JOB_ROOT: /tmp/audio-suite
      AUDIO_SUITE_ARTIFACT_TTL_SECONDS: 3600
      AUDIO_SUITE_CORS_ORIGIN_REGEX: ${AUDIO_SUITE_CORS_ORIGIN_REGEX:-https?://(localhost|127\.0\.0\.1)(:\d+)?|https?://[a-z0-9.-]+(:\d+)?}
    ports:
      - "${AUDIO_SUITE_WORKER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_AUDIO_SUITE_API_BASE_URL: ${AUDIO_SUITE_WORKER_PUBLIC_URL:-http://localhost:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    environment:
      NEXT_PUBLIC_AUDIO_SUITE_API_BASE_URL: ${AUDIO_SUITE_WORKER_PUBLIC_URL:-http://localhost:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      worker:
        condition: service_healthy
    ports:
      - "${AUDIO_SUITE_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
